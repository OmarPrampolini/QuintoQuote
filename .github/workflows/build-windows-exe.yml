name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv and install project dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e .
          .\.venv\Scripts\python.exe -m pip install pyinstaller

      - name: Install Tesseract OCR
        shell: pwsh
        run: |
          choco install tesseract --yes --no-progress

      - name: Build portable EXE package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build_exe.ps1 -Clean

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuintoQuote-portable-windows
          path: dist/QuintoQuote-portable.zip
          if-no-files-found: error

      - name: Upload build folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuintoQuote-windows-folder
          path: dist/QuintoQuote
          if-no-files-found: error

      - name: Attach ZIP to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/QuintoQuote-portable.zip
